name: Build VodouLauncher APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      notify:
        description: 'Send notification when done'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build Debug APK
      if: github.event.inputs.build_type == 'debug' || github.event_name == 'push' || github.event_name == 'pull_request'
      run: |
        ./gradlew assembleDebug
        echo "APK built: $(find . -name '*.apk' -type f)"
    
    - name: Build Release APK
      if: github.event.inputs.build_type == 'release'
      run: |
        ./gradlew assembleRelease
        echo "Release APK built: $(find . -name '*.apk' -type f)"
    
    - name: List APK files
      run: |
        echo "=== APK Files Found ==="
        find . -name "*.apk" -type f | xargs ls -la
        echo "======================"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: vodoulauncher-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 7
    
    - name: Get APK info
      id: apk_info
      run: |
        APK_FILE=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
        if [ -f "$APK_FILE" ]; then
          APK_NAME=$(basename "$APK_FILE")
          APK_SIZE=$(stat -f%z "$APK_FILE" 2>/dev/null || stat -c%s "$APK_FILE")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1024 / 1024" | bc)
          echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT
          echo "APK_SIZE=$APK_SIZE_MB" >> $GITHUB_OUTPUT
          echo "APK_PATH=$APK_FILE" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_NAME (${APK_SIZE_MB}MB)"
        else
          echo "No APK file found!"
          exit 1
        fi
    
    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.inputs.notify == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: "VodouLauncher Build #${{ github.run_number }}"
        body: |
          # VodouLauncher APK Build
          
          **Build Information:**
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - APK Size: ${{ steps.apk_info.outputs.APK_SIZE }} MB
          - Build Date: ${{ github.event.head_commit.timestamp }}
          
          **Download:** See attached APK file
          
          **Installation:**
          1. Download the APK file
          2. Enable "Install from unknown sources" in Android settings
          3. Open the downloaded APK file
          4. Install and set as default launcher
          
          **Features:**
          - Vista-evolved glass UI
          - Performance optimized
          - Modern Android launcher
          - GitHub Copilot ready
          
          **Repository:** https://github.com/ether4o4/VodouLauncher
        draft: false
        prerelease: false
        files: |
          ${{ steps.apk_info.outputs.APK_PATH }}
    
    - name: Create summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Build Successful!**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**APK Details:**" >> $GITHUB_STEP_SUMMARY
        echo "- File: ${{ steps.apk_info.outputs.APK_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- Size: ${{ steps.apk_info.outputs.APK_SIZE }} MB" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Download Links:**" >> $GITHUB_STEP_SUMMARY
        echo "1. [Download APK from Artifacts](https://github.com/ether4o4/VodouLauncher/suites/${{ github.run_id }}/artifacts/${{ github.run_attempt }})" >> $GITHUB_STEP_SUMMARY
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        echo "2. [GitHub Release](https://github.com/ether4o4/VodouLauncher/releases/tag/build-${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the APK" >> $GITHUB_STEP_SUMMARY
        echo "2. Install on Android device" >> $GITHUB_STEP_SUMMARY
        echo "3. Set as default launcher" >> $GITHUB_STEP_SUMMARY
        echo "4. Enjoy the Vista-evolved experience!" >> $GITHUB_STEP_SUMMARY
    
    - name: Send Telegram notification
      if: github.event.inputs.notify == 'true' && github.event_name == 'workflow_dispatch'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
          MESSAGE="🚀 VodouLauncher APK Build Complete!
          
          ✅ Build #${{ github.run_number }} successful!
          
          📱 APK: ${{ steps.apk_info.outputs.APK_NAME }}
          📦 Size: ${{ steps.apk_info.outputs.APK_SIZE }} MB
          
          🔗 Download: https://github.com/ether4o4/VodouLauncher/suites/${{ github.run_id }}/artifacts/${{ github.run_attempt }}
          
          📝 Commit: ${{ github.sha }}
          
          Install and enjoy the Vista-evolved launcher! 🎨"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"
        fi